services:
  - type: static
    name: syncflow-app
    env: static
    buildCommand: npm run build
    publishPath: client/dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
